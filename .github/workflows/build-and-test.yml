name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          # Install dependencies for building raylib and the game
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev xvfb git
          # Build and install raylib from source
          git clone https://github.com/raysan5/raylib.git
          cd raylib
          mkdir build && cd build
          cmake .. -DBUILD_SHARED_LIBS=ON
          make -j4
          sudo make install
          cd ../..
          # Install Zig from official tarball (matching local version)
          ZIG_VERSION=0.15.2
          wget https://ziglang.org/download/$ZIG_VERSION/zig-linux-x86_64-$ZIG_VERSION.tar.xz
          tar -xf zig-linux-x86_64-$ZIG_VERSION.tar.xz
          sudo mv zig-linux-x86_64-$ZIG_VERSION/zig /usr/local/bin/
          sudo mv zig-linux-x86_64-$ZIG_VERSION/lib/* /usr/local/lib/
          zig version

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Verify build
        run: ls -la zig-out/bin/

      - name: Test (run for 5 seconds)
        run: |
          set +e
          timeout 5 xvfb-run -a ./zig-out/bin/worm-game
          exit_code=$?
          set -e
          if [ $exit_code -ne 0 ] && [ $exit_code -ne 124 ]; then
              echo "Game exited with unexpected code: $exit_code"
              exit 1
          fi
          
